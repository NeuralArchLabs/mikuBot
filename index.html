<!DOCTYPE html>

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>mikuBot Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    /* Custom Scrollbar */
    .custom-scrollbar::-webkit-scrollbar {
      width: 8px;
      height: 8px;
    }
    .custom-scrollbar::-webkit-scrollbar-track {
      background: rgba(15, 23, 42, 0.5);
    }
    .custom-scrollbar::-webkit-scrollbar-thumb {
      background: rgba(51, 65, 85, 0.5);
      border-radius: 4px;
    }
    .custom-scrollbar::-webkit-scrollbar-thumb:hover {
      background: rgba(71, 85, 105, 0.8);
    }
    
    /* Markdown Styles */
    .markdown-body p { margin-bottom: 0.75em; }
    .markdown-body ul { list-style-type: disc; margin-left: 1.5em; margin-bottom: 0.75em; }
    .markdown-body ol { list-style-type: decimal; margin-left: 1.5em; margin-bottom: 0.75em; }
    .markdown-body h1 { font-size: 1.5em; font-weight: bold; margin-top: 1em; margin-bottom: 0.5em; color: #60a5fa; }
    .markdown-body h2 { font-size: 1.25em; font-weight: bold; margin-top: 1em; margin-bottom: 0.5em; color: #93c5fd; }
    .markdown-body h3 { font-size: 1.1em; font-weight: bold; margin-top: 1em; margin-bottom: 0.5em; }
    .markdown-body code { background: rgba(0,0,0,0.3); padding: 0.2em 0.4em; border-radius: 4px; font-family: monospace; font-size: 0.9em; }
    .markdown-body pre { background: rgba(0,0,0,0.3); padding: 1em; border-radius: 8px; overflow-x: auto; margin-bottom: 1em; }
    .markdown-body pre code { background: none; padding: 0; }
    .markdown-body blockquote { border-left: 3px solid #475569; padding-left: 1em; color: #94a3b8; font-style: italic; }
    .markdown-body table { width: 100%; border-collapse: collapse; margin-bottom: 1em; }
    .markdown-body th, .markdown-body td { border: 1px solid #334155; padding: 0.5em; text-align: left; }
    .markdown-body th { background: rgba(30, 41, 59, 0.5); }
  </style>
