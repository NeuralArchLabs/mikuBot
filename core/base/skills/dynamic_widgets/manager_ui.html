<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dynamic Widgets Manager</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

        :root {
            --bg-color: #050508;
            --surface-color: rgba(20, 20, 25, 0.6);
            --surface-hover: rgba(30, 30, 40, 0.8);
            --surface-border: rgba(255, 255, 255, 0.06);
            --surface-border-hover: rgba(167, 139, 250, 0.4);
            --primary: #a78bfa;
            --primary-glow: rgba(167, 139, 250, 0.5);
            --secondary: #60a5fa;
            --danger: #fdba74;
            --danger-hover: #f97316;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            background-image: 
                radial-gradient(circle at 15% 50%, rgba(139, 92, 246, 0.2), transparent 45%),
                radial-gradient(circle at 85% 30%, rgba(59, 130, 246, 0.15), transparent 45%);
            color: var(--text-main);
            margin: 0;
            overflow: hidden;
            height: 100vh;
            display: flex;
            flex-direction: column;
            -webkit-user-select: none;
            user-select: none;
        }

        /* Titlebar (Draggable) */
        .titlebar {
            -webkit-app-region: drag;
            height: 48px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 24px;
            background: linear-gradient(to bottom, rgba(5, 5, 8, 0.8), transparent);
            z-index: 100;
        }

        .titlebar-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .miku-logo {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            box-shadow: 0 0 10px var(--primary-glow);
        }

        .titlebar h1 {
            font-size: 13px;
            font-weight: 600;
            margin: 0;
            letter-spacing: 1px;
            color: var(--text-muted);
            text-transform: uppercase;
        }

        .close-btn {
            -webkit-app-region: no-drag;
            background: transparent;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            padding: 6px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }

        .close-btn:hover {
            background: rgba(255, 255, 255, 0.1);
            color: white;
            box-shadow: 0 0 12px rgba(255,255,255,0.1);
        }

        /* Content Area */
        .container {
            flex: 1;
            padding: 40px 48px;
            overflow-y: auto;
            scrollbar-width: none; /* Firefox */
        }
        
        .container::-webkit-scrollbar {
            display: none; /* Chrome/Safari */
        }

        .header {
            margin-bottom: 48px;
            text-align: center;
        }

        .header h2 {
            font-size: 36px;
            font-weight: 700;
            margin: 0 0 12px 0;
            background: linear-gradient(135deg, #c4b5fd, #93c5fd);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0px 4px 20px rgba(167, 139, 250, 0.2);
            letter-spacing: -0.5px;
        }

        .header p {
            margin: 0;
            color: var(--text-muted);
            font-size: 16px;
            font-weight: 400;
        }

        /* Grid */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 24px;
            padding-bottom: 40px;
        }

        /* Widget Card */
        .card {
            background: var(--surface-color);
            border: 1px solid var(--surface-border);
            border-radius: 20px;
            padding: 24px;
            -webkit-backdrop-filter: blur(24px);
            backdrop-filter: blur(24px);
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            display: flex;
            flex-direction: column;
            gap: 20px;
            animation: fadeIn 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            opacity: 0;
            transform: translateY(20px);
            box-shadow: 0 4px 24px rgba(0,0,0,0.2);
        }

        @keyframes fadeIn {
            to { opacity: 1; transform: translateY(0); }
        }

        .card:hover {
            transform: translateY(-6px) scale(1.02);
            background: var(--surface-hover);
            border-color: var(--surface-border-hover);
            box-shadow: 0 20px 40px rgba(0,0,0,0.4), 0 0 20px rgba(167, 139, 250, 0.15) inset;
        }

        .card-header {
            display: flex;
            align-items: flex-start;
            gap: 16px;
        }

        .card-icon {
            width: 48px;
            height: 48px;
            background: linear-gradient(135deg, rgba(167, 139, 250, 0.1), rgba(96, 165, 250, 0.1));
            border: 1px solid rgba(167, 139, 250, 0.2);
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--primary);
            flex-shrink: 0;
            transition: transform 0.3s;
        }
        
        .card:hover .card-icon {
            transform: scale(1.1) rotate(5deg);
            border-color: var(--primary);
            box-shadow: 0 0 15px var(--primary-glow);
        }

        .card-info {
            flex: 1;
            overflow: hidden;
        }

        .card-info h3 {
            margin: 0 0 6px 0;
            font-size: 18px;
            font-weight: 600;
            color: var(--text-main);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .card-info p {
            margin: 0;
            font-size: 13px;
            color: var(--text-muted);
            line-height: 1.5;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .card-actions {
            display: flex;
            gap: 12px;
            margin-top: auto;
            border-top: 1px solid rgba(255,255,255,0.04);
            padding-top: 20px;
        }

        .btn {
            flex: 1;
            padding: 12px;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            border: none;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            background: rgba(255, 255, 255, 0.05);
            color: var(--text-main);
        }

        .btn-play {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: #000;
            box-shadow: 0 4px 15px rgba(167, 139, 250, 0.3);
        }

        .btn-play:hover {
            box-shadow: 0 6px 20px rgba(167, 139, 250, 0.5);
            transform: translateY(-2px);
            filter: brightness(1.1);
        }

        .btn-delete {
            background: transparent;
            color: var(--text-muted);
            border: 1px solid transparent;
            flex: 0 0 auto;
            width: 44px;
            padding: 0;
        }

        .btn-delete:hover {
            background: rgba(253, 186, 116, 0.1);
            color: var(--danger);
            border-color: rgba(253, 186, 116, 0.2);
            transform: translateY(-2px);
        }

        .empty-state {
            grid-column: 1 / -1;
            text-align: center;
            padding: 80px 20px;
            background: var(--surface-color);
            border-radius: 20px;
            border: 1px dashed var(--surface-border);
            color: var(--text-muted);
            -webkit-backdrop-filter: blur(10px);
            backdrop-filter: blur(10px);
        }
        .empty-state svg {
            margin-bottom: 20px;
            opacity: 0.4;
            color: var(--primary);
            filter: drop-shadow(0 0 10px var(--primary-glow));
        }
        .empty-state h3 {
            margin: 0 0 8px 0;
            color: var(--text-main);
            font-size: 20px;
        }
    </style>
</head>
<body>
    <div class="titlebar">
        <div class="titlebar-left">
            <div class="miku-logo"></div>
            <h1>Dynamic Widgets</h1>
        </div>
        <button class="close-btn" id="closeBtn" title="Close" aria-label="Close manager">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6L6 18M6 6l12 12"></path></svg>
        </button>
    </div>

    <div class="container">


        <div class="grid" id="widgetGrid">
            <!-- Widgets injected here -->
        </div>
    </div>

    <script>
        const { ipcRenderer } = require('electron');

        document.getElementById('closeBtn').addEventListener('click', () => {
            ipcRenderer.send('close-manager');
        });

        async function loadWidgets() {
            const grid = document.getElementById('widgetGrid');
            grid.innerHTML = ''; 

            try {
                const widgets = await ipcRenderer.invoke('get-widgets');
                
                if (!widgets || widgets.length === 0) {
                    grid.innerHTML = `
                        <div class="empty-state">
                            <svg width="56" height="56" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M4 14a2 2 0 0 1 2-2h12a2 2 0 0 1 2 2v4a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2v-4z"/><path d="M4 10a2 2 0 0 1 2-2h12a2 2 0 0 1 2 2v2H4v-2z"/><path d="M8 10v4"/><path d="M16 10v4"/></svg>
                            <h3>No Neural Widgets</h3>
                            <p>Ask Miku to generate a new widget to get started.</p>
                        </div>
                    `;
                    return;
                }

                widgets.forEach((widget, i) => {
                    const id = widget.id;
                    const filename = widget.filename;
                    const description = widget.description || 'Custom generated micro-application bounding box.';
                    
                    const delay = Math.min(i * 0.08, 0.5); // Cap delay so it doesn't take forever
                    
                    const el = document.createElement('div');
                    el.className = 'card';
                    el.style.animationDelay = `${delay}s`;
                    el.innerHTML = `
                        <div class="card-header">
                            <div class="card-icon">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="4" ry="4"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="9" y1="21" x2="9" y2="9"/></svg>
                            </div>
                            <div class="card-info">
                                <h3>${id.replace(/-/g, ' ').replace(/\b\w/g, l => l.toUpperCase())}</h3>
                                <p>${description}</p>
                            </div>
                        </div>
                        <div class="card-actions">
                            <button class="btn btn-play" onclick="launchWidget('${filename}')">
                                <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor" stroke="none"><polygon points="6 4 20 12 6 20 6 4"></polygon></svg>
                                Initialize Element
                            </button>
                            <button class="btn btn-delete" onclick="deleteWidget('${filename}')" title="Delete Widget">
                                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18"/><path d="M19 6L18 20a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
                            </button>
                        </div>
                    `;
                    grid.appendChild(el);
                });

            } catch(e) {
                console.error("Error loading widgets:", e);
            }
        }

        window.launchWidget = (filename) => {
            ipcRenderer.send('launch-widget', filename);
        };

        window.deleteWidget = (filename) => {
            if(confirm('A neural component will be permanently erased. Proceed?')) {
                ipcRenderer.send('delete-widget', filename);
            }
        };

        ipcRenderer.on('widget-deleted', () => {
            loadWidgets();
        });

        // Init
        loadWidgets();
    </script>
</body>
</html>
