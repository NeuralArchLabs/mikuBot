<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7">
    <title>Dynamic Widgets Manager</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

        :root {
            --bg-color: transparent;
            --surface-color: rgba(30, 41, 59, 0.2);
            --surface-hover: var(--surface-color);
            --surface-border: rgba(255, 255, 255, 0.03);
            --surface-border-hover: rgba(255, 255, 255, 0.08);
            --primary: #a78bfa;
            --primary-glow: rgba(167, 139, 250, 0.5);
            --secondary: #60a5fa;
            --danger: #fdba74;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --icon-gradient-a: rgba(167, 139, 250, 0.1);
            --icon-gradient-b: rgba(96, 165, 250, 0.1);
            --icon-border: rgba(167, 139, 250, 0.2);
            --card-divider: rgba(255,255,255,0.04);
            --shadow-color: rgba(0,0,0,0.25);
            --btn-text: #000;
            --title-from: #c4b5fd;
            --title-to: #93c5fd;
            --glow-a: rgba(139, 92, 246, 0.08);
            --glow-b: rgba(59, 130, 246, 0.05);
            --pc-color: rgba(167, 139, 250, 0.4);
            --pc-glow: rgba(167, 139, 250, 0.15);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        /* -- Custom scrollbar -- */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb {
            background: linear-gradient(180deg, var(--primary), var(--secondary));
            border-radius: 3px;
            opacity: 0;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: linear-gradient(180deg, var(--primary), var(--secondary));
        }
        body {
            font-family: 'Inter', sans-serif;
            color: var(--text-main);
            overflow-y: auto;
            height: 100vh;
            -webkit-user-select: none;
            user-select: none;
            scrollbar-width: thin;
            scrollbar-color: var(--primary) transparent;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            z-index: -1;
            background-color: var(--bg-color);
            background-image:
                radial-gradient(circle at 15% 50%, var(--glow-a), transparent 45%),
                radial-gradient(circle at 85% 30%, var(--glow-b), transparent 45%);
            pointer-events: none;
        }

        .container {
            padding: 12px 8px;
        }

        .header {
            margin-bottom: 14px;
            text-align: center;
        }

        .header h2 {
            font-size: 16px;
            font-weight: 700;
            margin: 0 0 3px 0;
            background: linear-gradient(135deg, var(--title-from), var(--title-to));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: -0.3px;
        }

        .header p {
            margin: 0;
            color: var(--text-muted);
            font-size: 9px;
            letter-spacing: 0.05em;
        }

        .grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 6px;
            padding-bottom: 20px;
        }

        /* -- Premium card (gradient border via ::after mask) -- */
        .card {
            position: relative;
            background: var(--surface-color);
            border: 1px solid var(--surface-border);
            border-radius: 0.65rem;
            padding: 8px;
            display: flex;
            flex-direction: column;
            gap: 6px;
            overflow: hidden;
            opacity: 0;
            transform: translateY(12px);
            animation: cardIn 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            transition: background 0.3s ease, box-shadow 0.3s ease;
        }

        .card::after {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: inherit;
            padding: 1px;
            background: linear-gradient(135deg, var(--pc-color), transparent 40%, transparent 60%, var(--pc-color));
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            mask-composite: exclude;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.4s ease;
        }

        .card:hover {
            background: var(--surface-hover);
            box-shadow: 0 8px 30px -8px rgba(0,0,0,0.15), 0 0 20px var(--pc-glow);
            border-color: transparent;
        }

        .card:hover::after {
            opacity: 1;
        }

        @keyframes cardIn {
            to { opacity: 1; transform: translateY(0); }
        }

        .card-header {
            display: flex;
            align-items: flex-start;
            gap: 7px;
        }

        .card-icon {
            width: 28px;
            height: 28px;
            background: linear-gradient(135deg, var(--icon-gradient-a), var(--icon-gradient-b));
            border: 1px solid var(--icon-border);
            border-radius: 7px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--primary);
            flex-shrink: 0;
        }

        .card-info h3 {
            margin: 0 0 2px 0;
            font-size: 11px;
            font-weight: 600;
            color: var(--text-main);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .card-info p {
            margin: 0;
            font-size: 9px;
            color: var(--text-muted);
            line-height: 1.35;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .card-actions {
            display: flex;
            gap: 5px;
            margin-top: auto;
            border-top: 1px solid var(--card-divider);
            padding-top: 6px;
        }

        .btn {
            flex: 1;
            padding: 5px 3px;
            border-radius: 6px;
            font-size: 9px;
            font-weight: 600;
            cursor: pointer;
            border: none;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 3px;
        }

        .btn-play {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: var(--btn-text);
            box-shadow: 0 4px 15px var(--primary-glow);
            position: relative;
            overflow: hidden;
        }

        .btn-play:hover {
            box-shadow: 0 6px 20px var(--primary-glow);
            transform: translateY(-1px);
        }

        .btn-play:active {
            transform: translateY(0) scale(0.97);
            box-shadow: 0 2px 8px var(--primary-glow);
        }

        .btn-play.loading {
            pointer-events: none;
            opacity: 0.85;
        }

        .btn-play.loading svg {
            animation: spin 0.8s linear infinite;
        }

        .btn-play.success {
            background: linear-gradient(135deg, #34d399, #60a5fa);
            pointer-events: none;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .btn-delete {
            background: transparent;
            color: var(--text-muted);
            border: 1px solid transparent;
            flex: 0 0 auto;
            width: 26px;
            padding: 0;
            transition: all 0.2s;
        }

        .btn-delete:hover {
            background: rgba(253, 186, 116, 0.1);
            color: var(--danger);
            border-color: rgba(253, 186, 116, 0.2);
        }

        .btn-delete:active {
            transform: scale(0.92);
        }

        .empty-state {
            grid-column: 1 / -1;
            text-align: center;
            padding: 30px 12px;
        }

        .empty-state svg { margin-bottom: 10px; opacity: 0.3; color: var(--primary); }
        .empty-state h3 { margin: 0 0 4px 0; color: var(--text-main); font-size: 13px; }
        .empty-state p { color: var(--text-muted); font-size: 10px; }

        /* -- Delete confirmation modal -- */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(6px);
            -webkit-backdrop-filter: blur(6px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 999;
            opacity: 0;
            animation: fadeIn 0.2s ease forwards;
        }
        .modal-box {
            background: var(--surface-color);
            border: 1px solid var(--surface-border-hover);
            border-radius: 1rem;
            padding: 20px;
            max-width: 280px;
            width: 90%;
            text-align: center;
            transform: scale(0.92);
            animation: modalIn 0.25s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }
        .modal-icon {
            width: 40px;
            height: 40px;
            margin: 0 auto 12px;
            border-radius: 12px;
            background: rgba(253, 186, 116, 0.1);
            border: 1px solid rgba(253, 186, 116, 0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--danger);
        }
        .modal-title {
            font-size: 13px;
            font-weight: 700;
            color: var(--text-main);
            margin-bottom: 6px;
        }
        .modal-desc {
            font-size: 10px;
            color: var(--text-muted);
            margin-bottom: 16px;
            line-height: 1.5;
            word-break: break-word;
        }
        .modal-actions {
            display: flex;
            gap: 8px;
        }
        .modal-actions button {
            flex: 1;
            padding: 8px;
            border-radius: 8px;
            font-size: 10px;
            font-weight: 600;
            cursor: pointer;
            border: none;
            transition: all 0.2s;
        }
        .modal-cancel {
            background: transparent;
            color: var(--text-muted);
            border: 1px solid var(--surface-border) !important;
        }
        .modal-cancel:hover {
            background: rgba(255,255,255,0.05);
            color: var(--text-main);
        }
        .modal-confirm {
            background: linear-gradient(135deg, #f87171, #fb923c);
            color: #fff;
            box-shadow: 0 4px 15px rgba(248, 113, 113, 0.3);
        }
        .modal-confirm:hover {
            box-shadow: 0 6px 20px rgba(248, 113, 113, 0.4);
            transform: translateY(-1px);
        }
        .modal-confirm:active { transform: translateY(0) scale(0.97); }
        @keyframes fadeIn { to { opacity: 1; } }
        @keyframes modalIn { to { transform: scale(1); } }

        /* -- Progressive enhancement -- */
        @media (min-width: 380px) {
            .container { padding: 16px 12px; }
            .header { margin-bottom: 18px; }
            .header h2 { font-size: 18px; }
            .header p { font-size: 10px; }
            .grid { gap: 8px; }
            .card { padding: 10px; gap: 8px; border-radius: 0.75rem; }
            .card-header { gap: 8px; }
            .card-icon { width: 32px; height: 32px; border-radius: 8px; }
            .card-info h3 { font-size: 12px; }
            .card-info p { font-size: 10px; }
            .card-actions { gap: 6px; padding-top: 8px; }
            .btn { padding: 6px 4px; border-radius: 7px; font-size: 10px; }
            .btn-delete { width: 28px; }
        }

        @media (min-width: 520px) {
            .container { padding: 22px 18px; }
            .header { margin-bottom: 24px; }
            .header h2 { font-size: 21px; }
            .header p { font-size: 11px; }
            .grid { grid-template-columns: repeat(auto-fill, minmax(190px, 1fr)); gap: 12px; }
            .card { padding: 14px; gap: 10px; border-radius: 1rem; }
            .card-header { gap: 10px; }
            .card-icon { width: 36px; height: 36px; border-radius: 10px; }
            .card-info h3 { font-size: 13px; }
            .card-info p { font-size: 11px; }
            .card-actions { gap: 8px; padding-top: 10px; }
            .btn { padding: 8px; border-radius: 8px; font-size: 11px; gap: 5px; }
            .btn-delete { width: 32px; }
        }

        @media (min-width: 700px) {
            .container { padding: 28px 28px; }
            .header h2 { font-size: 24px; }
            .header { margin-bottom: 32px; }
            .grid { grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 16px; }
            .card { padding: 16px; }
            .card-icon { width: 42px; height: 42px; border-radius: 12px; }
            .card-info h3 { font-size: 14px; }
            .card-info p { font-size: 12px; }
            .btn { padding: 10px; font-size: 12px; }
        }
    </style>
    <!--THEME_INJECTION-->
</head>
<body>
    <div class="container">
        <div class="header">
            <h2>Dynamic Widgets</h2>
            <p>Manage your neural micro-applications</p>
        </div>

        <div class="grid" id="widgetGrid"></div>
    </div>

    <script>
        // -- postMessage bridge to parent SkillsPanel --
        function skillRequest(args) {
            return new Promise(function(resolve) {
                var id = Math.random().toString(36).slice(2);
                args._reqId = id;
                window._pending = window._pending || {};
                window._pending[id] = resolve;
                window.parent.postMessage({ type: 'skill-action', args: args }, '*');
            });
        }

        window.addEventListener('message', function(e) {
            if (e.data && e.data.type === 'skill-response' && e.data._reqId) {
                var cb = (window._pending || {})[e.data._reqId];
                if (cb) { delete window._pending[e.data._reqId]; cb(e.data.data); }
            }
        });

        // -- Widget Manager Logic --
        function formatName(id) {
            return (id || '').replace(/-/g, ' ').replace(/\b\w/g, function(l) { return l.toUpperCase(); });
        }

        function escapeHtml(str) {
            var div = document.createElement('div');
            div.textContent = str || '';
            return div.innerHTML;
        }

        function showDeleteModal(name, onConfirm) {
            var existing = document.querySelector('.modal-overlay');
            if (existing) existing.remove();
            var overlay = document.createElement('div');
            overlay.className = 'modal-overlay';
            overlay.innerHTML =
                '<div class="modal-box">' +
                    '<div class="modal-icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18"/><path d="M19 6L18 20a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg></div>' +
                    '<div class="modal-title">Delete Widget</div>' +
                    '<div class="modal-desc">\"' + escapeHtml(name) + '\" will be permanently erased. This cannot be undone.</div>' +
                    '<div class="modal-actions">' +
                        '<button class="modal-cancel">Cancel</button>' +
                        '<button class="modal-confirm">Delete</button>' +
                    '</div>' +
                '</div>';
            document.body.appendChild(overlay);
            overlay.querySelector('.modal-cancel').addEventListener('click', function() { overlay.remove(); });
            overlay.querySelector('.modal-confirm').addEventListener('click', function() { overlay.remove(); onConfirm(); });
            overlay.addEventListener('click', function(e) { if (e.target === overlay) overlay.remove(); });
        }

        async function loadWidgets() {
            var grid = document.getElementById('widgetGrid');
            grid.innerHTML = '';

            try {
                var res = await skillRequest({ action: 'list' });
                var data = res && res.data ? res.data : res;
                var widgets = (data && data.status === 'success' && Array.isArray(data.widgets)) ? data.widgets : [];

                if (!widgets.length) {
                    grid.innerHTML = '<div class="empty-state">' +
                        '<svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M4 14a2 2 0 0 1 2-2h12a2 2 0 0 1 2 2v4a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2v-4z"/><path d="M4 10a2 2 0 0 1 2-2h12a2 2 0 0 1 2 2v2H4v-2z"/></svg>' +
                        '<h3>No Neural Widgets</h3>' +
                        '<p>Ask Miku to generate a new widget to get started.</p></div>';
                    return;
                }

                widgets.forEach(function(w, i) {
                    var id = typeof w === 'string' ? w : (w.id || '');
                    var desc = (typeof w === 'object' && w.description && w.description !== 'HTML Component')
                        ? w.description
                        : '';
                    var filename = id + '.html';

                    var el = document.createElement('div');
                    el.className = 'card';
                    el.style.animationDelay = (i * 80) + 'ms';
                    el.innerHTML =
                        '<div class="card-header">' +
                            '<div class="card-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" width="14" height="14"><rect x="3" y="3" width="18" height="18" rx="4" ry="4"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="9" y1="21" x2="9" y2="9"/></svg></div>' +
                            '<div class="card-info"><h3>' + escapeHtml(formatName(id)) + '</h3>' +
                            (desc ? '<p>' + escapeHtml(desc) + '</p>' : '') +
                            '</div>' +
                        '</div>' +
                        '<div class="card-actions">' +
                            '<button class="btn btn-play" data-launch="' + escapeHtml(filename) + '"><svg width="10" height="10" viewBox="0 0 24 24" fill="currentColor" stroke="none"><polygon points="6 4 20 12 6 20 6 4"></polygon></svg>Initialize</button>' +
                            '<button class="btn btn-delete" data-delete="' + escapeHtml(id) + '" title="Delete"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18"/><path d="M19 6L18 20a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg></button>' +
                        '</div>';
                    grid.appendChild(el);
                });

                grid.addEventListener('click', function(e) {
                    var launchBtn = e.target.closest('[data-launch]');
                    var deleteBtn = e.target.closest('[data-delete]');

                    if (launchBtn && !launchBtn.classList.contains('loading') && !launchBtn.classList.contains('success')) {
                        var filename = launchBtn.getAttribute('data-launch');
                        var widgetId = filename.replace('.html', '');
                        var originalSvg = launchBtn.innerHTML;
                        launchBtn.classList.add('loading');
                        launchBtn.innerHTML = '<svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2v4m0 12v4m-7.07-3.93l2.83-2.83m8.48-8.48l2.83-2.83M2 12h4m12 0h4M4.93 4.93l2.83 2.83m8.48 8.48l2.83 2.83"/></svg> Initializing...';
                        skillRequest({ action: 'launch', widget_id: widgetId }).then(function() {
                            launchBtn.classList.remove('loading');
                            launchBtn.classList.add('success');
                            launchBtn.innerHTML = '<svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M20 6L9 17l-5-5"/></svg> Launched';
                            setTimeout(function() {
                                launchBtn.classList.remove('success');
                                launchBtn.innerHTML = originalSvg;
                            }, 1800);
                        }).catch(function() {
                            launchBtn.classList.remove('loading');
                            launchBtn.innerHTML = originalSvg;
                        });
                    }

                    if (deleteBtn) {
                        var widgetId = deleteBtn.getAttribute('data-delete');
                        var widgetName = formatName(widgetId);
                        showDeleteModal(widgetName, function() {
                            deleteBtn.style.transform = 'scale(0.85)';
                            deleteBtn.style.opacity = '0.5';
                            skillRequest({ action: 'delete', widget_id: widgetId }).then(function() {
                                loadWidgets();
                            });
                        });
                    }
                });

            } catch(e) {
                console.error('Error loading widgets:', e);
            }
        }

        loadWidgets();
    </script>
</body>
</html>
